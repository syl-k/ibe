name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # macOS: node-pty is a native module and the app targets macOS.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (with native rebuild)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
